[build]
builder = "nixpacks"

[deploy]
startCommand = "php artisan config:clear && php artisan route:clear && php artisan migrate --force && (php artisan queue:work --sleep=3 --tries=3 --max-time=3600 &) && (php artisan schedule:work &) && php artisan serve --host=0.0.0.0 --port=$PORT"
numReplicas = 1
